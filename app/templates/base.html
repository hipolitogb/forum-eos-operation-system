<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ settings.forum_name }} — {{ settings.tagline }}</title>
  {% if settings.logo_path %}
  <link rel="icon" href="/static/{{ settings.logo_path }}">
  {% endif %}
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="{{ brand.google_fonts_url }}" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"{{ settings.body_font }}"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['"{{ settings.display_font }}"', 'serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            dark: { 900: '#0e0d0b', 800: '#171512', 700: '#2a2621', 600: '#3a352e' },
            brand: {
              primary: '{{ settings.color_primary }}',
              'primary-soft': '{{ brand.primary_soft }}',
              'primary-deep': '{{ brand.primary_deep }}',
              secondary: '{{ settings.color_secondary }}',
              'secondary-deep': '{{ brand.secondary_deep }}',
              tertiary: '{{ settings.color_tertiary }}',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba({{ brand.primary_rgb }}, 0.08), transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba({{ brand.secondary_rgb }}, 0.06), transparent 60%),
        #0e0d0b;
      background-attachment: fixed;
    }

    /* Tags */
    .tag-open { background: rgba({{ brand.primary_rgb }}, 0.14); color: {{ settings.color_primary }}; }
    .tag-deep-dive { background: rgba({{ brand.secondary_rgb }}, 0.14); color: #F87171; }
    .tag-topical { background: rgba({{ brand.tertiary_rgb }}, 0.14); color: {{ settings.color_tertiary }}; }
    .tag-recurring { background: rgba(251, 146, 60, 0.14); color: #FDBA74; }
    .tag-improving { background: rgba(52, 211, 153, 0.14); color: #6EE7B7; }

    .parking-item { transition: transform 0.15s, opacity 0.15s; }
    .parking-item.sortable-ghost { opacity: 0.4; transform: scale(0.98); }
    .parking-item.sortable-chosen { box-shadow: 0 0 0 1px {{ settings.color_primary }}; }
    .htmx-swapping { opacity: 0; transition: opacity 0.2s; }

    /* Decorative accent stripe */
    .stripe-accent {
      background-image: repeating-linear-gradient(
        45deg,
        {{ settings.color_secondary }} 0 8px,
        {{ settings.color_primary }} 8px 16px
      );
    }
  </style>
</head>
<body class="font-sans text-gray-200 min-h-screen antialiased">
  {% block content %}{% endblock %}
</body>
</html>
