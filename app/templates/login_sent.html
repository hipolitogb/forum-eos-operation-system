{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm text-center">
    <div class="text-5xl mb-4">📬</div>
    <h1 class="font-display text-xl text-brand-primary mb-3">Check your email</h1>
    <p class="text-sm text-gray-400 mb-2">
      We sent a sign-in link to <strong class="text-gray-200">{{ email }}</strong>.
    </p>
    <p class="text-xs text-gray-500 mb-6">The link expires in 15 minutes. Check spam if you don't see it.</p>
    <a href="/login" class="text-xs text-gray-500 hover:text-brand-primary transition-colors">← Try a different email</a>
  </div>
</div>
{% endblock %}
