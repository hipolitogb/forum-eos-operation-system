{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      {% if settings.logo_path %}
      <img src="/static/{{ settings.logo_path }}" alt="{{ settings.forum_name }}" class="w-16 h-16 mx-auto rounded-full object-cover mb-4">
      {% else %}
      <div class="w-16 h-16 mx-auto rounded-full bg-brand-primary/15 border border-brand-primary/30 flex items-center justify-center mb-4">
        <span class="font-display text-2xl text-brand-primary">A</span>
      </div>
      {% endif %}
      <h1 class="font-display text-xl text-brand-primary tracking-wide">Admin</h1>
      <p class="text-xs text-gray-500 mt-1">{{ settings.forum_name }}</p>
    </div>

    {% if error %}
    <div class="bg-red-500/10 border border-red-500/30 rounded-md px-4 py-3 text-sm text-red-300 mb-4">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login" class="space-y-4">
      <div>
        <label class="block text-xs text-gray-500 uppercase mb-1">Username</label>
        <input type="text" name="username" required autofocus autocomplete="username"
          class="w-full bg-dark-800 border border-dark-700 rounded-lg px-4 py-3 text-sm focus:border-brand-primary focus:outline-none">
      </div>
      <div>
        <label class="block text-xs text-gray-500 uppercase mb-1">Password</label>
        <input type="password" name="password" required autocomplete="current-password"
          class="w-full bg-dark-800 border border-dark-700 rounded-lg px-4 py-3 text-sm focus:border-brand-primary focus:outline-none">
      </div>
      <button type="submit" class="w-full py-3 bg-brand-primary text-gray-900 rounded-lg text-sm font-bold hover:brightness-110 transition">Sign in</button>
    </form>

    <div class="text-center mt-4">
      <a href="/admin/forgot" class="text-xs text-gray-500 hover:text-brand-primary transition-colors">Forgot password?</a>
    </div>
  </div>
</div>
{% endblock %}
