{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="font-display text-xl text-brand-primary tracking-wide">Set new password</h1>
    </div>

    {% if error %}
    <div class="bg-red-500/10 border border-red-500/30 rounded-md px-4 py-3 text-sm text-red-300 mb-4">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/reset" class="space-y-4">
      <input type="hidden" name="token" value="{{ token }}">
      <div>
        <label class="block text-xs text-gray-500 uppercase mb-1">New password <span class="text-gray-600 normal-case">(min 6 chars)</span></label>
        <input type="password" name="new_password" required minlength="6" autofocus autocomplete="new-password"
          class="w-full bg-dark-800 border border-dark-700 rounded-lg px-4 py-3 text-sm focus:border-brand-primary focus:outline-none">
      </div>
      <div>
        <label class="block text-xs text-gray-500 uppercase mb-1">Confirm password</label>
        <input type="password" name="confirm_password" required minlength="6" autocomplete="new-password"
          class="w-full bg-dark-800 border border-dark-700 rounded-lg px-4 py-3 text-sm focus:border-brand-primary focus:outline-none">
      </div>
      <button type="submit" class="w-full py-3 bg-brand-primary text-gray-900 rounded-lg text-sm font-bold hover:brightness-110 transition">Update password</button>
    </form>

    <div class="text-center mt-4">
      <a href="/admin/login" class="text-xs text-gray-500 hover:text-brand-primary transition-colors">← Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
