<tr id="admin-member-{{ member.id }}" class="border-b border-dark-700/60">
  <td class="py-2 px-3 text-sm">{{ member.name }}</td>
  <td class="py-2 px-3">
    {% if member.role %}
    <span class="text-[0.55rem] font-semibold uppercase tracking-wide px-1.5 py-0.5 rounded bg-brand-primary/10 text-brand-primary">{{ member.role }}</span>
    {% else %}
    <span class="text-xs text-gray-600">—</span>
    {% endif %}
  </td>
  <td class="py-2 px-3 text-sm text-gray-400 font-mono">{{ member.display_order }}</td>
  <td class="py-2 px-3 text-right space-x-2 whitespace-nowrap">
    <button
      hx-get="/admin/members/{{ member.id }}/edit"
      hx-target="#admin-member-{{ member.id }}"
      hx-swap="outerHTML"
      class="btn-xs btn-xs-primary">Edit</button>
    <button
      hx-delete="/admin/members/{{ member.id }}"
      hx-target="#admin-member-{{ member.id }}"
      hx-swap="outerHTML swap:0.15s"
      hx-confirm="Delete {{ member.name }}?"
      class="btn-xs btn-xs-danger">Delete</button>
  </td>
</tr>
