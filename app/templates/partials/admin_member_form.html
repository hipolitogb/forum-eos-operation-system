{% if member %}
<tr id="admin-member-{{ member.id }}" class="border-b border-dark-700/60 bg-brand-primary/5">
  <td class="py-2 px-3">
    <input type="text" name="name" value="{{ member.name }}" required placeholder="Name"
      class="w-full bg-dark-900 border border-dark-700 rounded-md px-2 py-1 text-sm">
  </td>
  <td class="py-2 px-3">
    <input type="email" name="email" value="{{ member.email or '' }}" placeholder="email@example.com"
      class="w-full bg-dark-900 border border-dark-700 rounded-md px-2 py-1 text-sm">
  </td>
  <td class="py-2 px-3">
    <input type="text" name="role" value="{{ member.role }}" placeholder="Role"
      class="w-full bg-dark-900 border border-dark-700 rounded-md px-2 py-1 text-sm">
  </td>
  <td class="py-2 px-3">
    <input type="number" name="display_order" value="{{ member.display_order }}"
      class="w-20 bg-dark-900 border border-dark-700 rounded-md px-2 py-1 text-sm font-mono">
  </td>
  <td class="py-2 px-3 text-right space-x-2 whitespace-nowrap">
    <button type="button"
      hx-post="/admin/members/{{ member.id }}"
      hx-target="#admin-member-{{ member.id }}"
      hx-swap="outerHTML"
      hx-include="closest tr"
      class="btn-xs btn-xs-primary">Save</button>
    <button type="button"
      hx-get="/admin/members/{{ member.id }}"
      hx-target="#admin-member-{{ member.id }}"
      hx-swap="outerHTML"
      class="btn-xs btn-xs-ghost">Cancel</button>
  </td>
</tr>
{% else %}
<tr id="admin-member-new" class="border-b border-dark-700/60 bg-brand-primary/5">
  <td class="py-2 px-3">
    <input type="text" name="name" value="" required placeholder="Name"
      class="w-full bg-dark-900 border border-dark-700 rounded-md px-2 py-1 text-sm">
  </td>
  <td class="py-2 px-3">
    <input type="email" name="email" value="" placeholder="email@example.com"
      class="w-full bg-dark-900 border border-dark-700 rounded-md px-2 py-1 text-sm">
  </td>
  <td class="py-2 px-3">
    <input type="text" name="role" value="" placeholder="Role (optional)"
      class="w-full bg-dark-900 border border-dark-700 rounded-md px-2 py-1 text-sm">
  </td>
  <td class="py-2 px-3">
    <input type="number" name="display_order" value="0"
      class="w-20 bg-dark-900 border border-dark-700 rounded-md px-2 py-1 text-sm font-mono">
  </td>
  <td class="py-2 px-3 text-right space-x-2 whitespace-nowrap">
    <button type="button"
      hx-post="/admin/members"
      hx-target="#admin-members-tbody"
      hx-swap="innerHTML"
      hx-include="closest tr"
      class="btn-xs btn-xs-primary">Create</button>
    <button type="button"
      onclick="document.getElementById('admin-member-new').remove();"
      class="btn-xs btn-xs-ghost">Cancel</button>
  </td>
</tr>
{% endif %}
