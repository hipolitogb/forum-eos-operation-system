<div id="member-{{ member.id }}" class="inline-flex items-center gap-2 px-3 py-2 bg-white/[0.04] border border-dark-700 rounded-lg text-sm group">
  {{ member.name }}
  {% if member.role %}
  <span class="text-[0.55rem] font-semibold uppercase tracking-wide px-1.5 py-0.5 rounded bg-brand-primary/10 text-brand-primary">{{ member.role }}</span>
  {% endif %}
  <button hx-delete="/members/{{ member.id }}" hx-target="#member-{{ member.id }}" hx-swap="outerHTML swap:0.2s" hx-confirm="Remove {{ member.name }}?" class="text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">&times;</button>
</div>
