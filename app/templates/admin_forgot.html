{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="font-display text-xl text-brand-primary tracking-wide">Reset password</h1>
      <p class="text-xs text-gray-500 mt-1">We'll send a reset link to the admin email.</p>
    </div>

    {% if msg %}
    <div class="bg-dark-800 border border-dark-700 rounded-md px-4 py-3 text-sm text-gray-300 mb-4">{{ msg }}</div>
    {% endif %}

    <form method="post" action="/admin/forgot">
      <button type="submit" class="w-full py-3 bg-brand-primary text-gray-900 rounded-lg text-sm font-bold hover:brightness-110 transition">Send reset link</button>
    </form>

    <div class="text-center mt-4">
      <a href="/admin/login" class="text-xs text-gray-500 hover:text-brand-primary transition-colors">← Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
